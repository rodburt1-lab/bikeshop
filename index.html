<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no">
    <title>BikeShop Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        html, body {
            font-size: 16px; 
            -webkit-text-size-adjust: 100%;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: contain;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        .custom-scroll::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 6px; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col font-sans select-none antialiased text-base">

    <header class="bg-slate-900 border-b border-slate-800 px-4 py-4 sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between max-w-5xl mx-auto">
            <div class="flex items-center space-x-3">
                <div class="h-9 w-9 bg-gradient-to-tr from-emerald-500 to-teal-400 rounded-lg flex items-center justify-center shadow-md">
                    <svg class="w-6 h-6 text-slate-950 stroke-[2.5]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 1 0 7.5 7.5h-7.5V6z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0 0 13.5 3v7.5z" />
                    </svg>
                </div>
                <h1 class="text-lg font-black tracking-tight text-white uppercase leading-none">BikeShop Hub</h1>
            </div>
            <div class="flex items-center space-x-2 bg-slate-950 px-3 py-1.5 rounded-lg border border-slate-800">
                <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse" id="statusDot"></div>
                <span class="text-xs font-mono tracking-wider font-bold uppercase text-slate-300" id="statusTxt">LIVE</span>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-5xl w-full mx-auto p-4 space-y-4 pb-28 overflow-x-hidden">
        
        <div class="grid grid-cols-2 gap-2 bg-slate-900 p-1.5 rounded-xl border border-slate-800 shadow-inner">
            <button id="btnTabAccordion" onclick="switchMainView('accordion')" class="py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 bg-slate-800 text-emerald-400 shadow-md">
                Retail Ops
            </button>
            <button id="btnTabWorkshop" onclick="switchMainView('workshop')" class="py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 text-slate-400 hover:text-slate-200">
                Workshop Metrics
            </button>
        </div>

        <div class="w-full bg-slate-900 border-2 border-slate-800 rounded-xl p-4 flex flex-col space-y-2 font-mono shadow-md" id="diagPipeline">
            <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pipeline Data Sync Status:</span>
            <span class="text-sm font-black text-amber-400 animate-pulse uppercase tracking-wider">Syncing Storage Array Node...</span>
        </div>

        <div id="uiAppSpinner" class="flex flex-col items-center justify-center py-24 space-y-4">
            <div class="w-10 h-10 border-4 border-emerald-500/30 border-t-emerald-400 rounded-full animate-spin"></div>
            <p class="text-sm font-mono text-slate-400 font-bold uppercase tracking-widest">Streaming Data Streams...</p>
        </div>

        <div id="panelAccordionView" class="hidden space-y-4 animate-fade-in"></div>
        <div id="panelWorkshopView" class="hidden space-y-4 animate-fade-in"></div>

    </main>

    <div class="fixed bottom-0 left-0 right-0 p-4 bg-gradient-to-t from-slate-950 via-slate-950/95 to-transparent z-40">
        <div class="max-w-5xl mx-auto">
            <button onclick="triggerDataPipelineSync()" class="w-full bg-slate-900 active:bg-slate-800 border-2 border-slate-800 active:border-slate-700 text-slate-200 active:text-white font-black py-4.5 px-4 rounded-xl text-xs uppercase tracking-widest shadow-2xl flex items-center justify-center space-x-2 transition-all active:scale-[0.98] h-14">
                <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
                </svg>
                <span>Revert Live Data Pipeline</span>
            </button>
        </div>
    </div>

    <script>
        // TARGET DEPLOYMENT LINK LINKED FROM EXCEL IFRAME VALUE
        const TARGET_DEPLOYMENT_ENDPOINT = "https://script.google.com/macros/s/AKfycbwfMnBHHeCSUxHzhijO7RdmXPbFTueMJtEW0G3XBtyDK1_7EtTJcFRkFdwFHHDiopzK/exec";

        let processedItems = [];
        let currentActiveTab = "accordion";
        let initialLoadDone = false;
        let activeAccordionKeys = new Set();

        window.addEventListener("DOMContentLoaded", () => {
            triggerDataPipelineSync();
        });

        function triggerDataPipelineSync() {
            document.getElementById("statusDot").className = "w-2.5 h-2.5 bg-amber-500 rounded-full animate-pulse";
            document.getElementById("statusTxt").innerText = "SYNC";
            
            let pipelineTxt = document.getElementById("diagPipeline");
            if (pipelineTxt) {
                pipelineTxt.innerHTML = `
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Pipeline Data Sync Status:</span>
                    <span class="text-sm font-black text-amber-400 animate-pulse uppercase tracking-wider">Acquiring Data Packets...</span>
                `;
            }
            
            if (!initialLoadDone) {
                document.getElementById("uiAppSpinner").classList.remove("hidden");
                document.getElementById("panelAccordionView").classList.add("hidden");
                document.getElementById("panelWorkshopView").classList.add("hidden");
            }

            fetch(TARGET_DEPLOYMENT_ENDPOINT, {
                method: "POST",
                mode: "cors",
                headers: { "Content-Type": "text/plain" }
            })
            .then(res => res.json())
            .then(data => processIncomingPayload(data))
            .catch(err => handleServerCrashException(err));
        }

        function handleServerCrashException(err) {
            document.getElementById("statusDot").className = "w-2.5 h-2.5 bg-rose-500 rounded-full";
            document.getElementById("statusTxt").innerText = "ERROR";
            document.getElementById("uiAppSpinner").classList.add("hidden");
            console.error(err);
        }

        function processIncomingPayload(rawObject) {
            document.getElementById("statusDot").className = "w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse";
            document.getElementById("statusTxt").innerText = "LIVE";

            let pipelineTxt = document.getElementById("diagPipeline");
            let rawServerRows = rawObject.data || [];
            let displayUkDate = rawObject.ukDate || "No Date";
            let displayUkTime = rawObject.ukTime || "No Time";

            if (rawObject.error || !rawServerRows || rawServerRows.length === 0) {
                if (pipelineTxt) pipelineTxt.innerHTML = `<span class="text-sm text-rose-500 font-black uppercase tracking-wider">Target Endpoint Core Refused Call</span>`;
                return;
            }

            if (pipelineTxt) {
                pipelineTxt.innerHTML = `
                    <div class="flex flex-col space-y-1">
                        <span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Inbox Timestamp:</span>
                        <div class="flex items-center space-x-3 mt-1">
                            <span class="text-base font-black text-emerald-400 tracking-wide">${displayUkDate}</span>
                            <span class="text-base font-black text-white uppercase bg-slate-950 px-2 py-0.5 rounded border border-slate-800">${displayUkTime}</span>
                        </div>
                    </div>
                `;
            }
            
            processedItems = []; 

            rawServerRows.forEach(row => {
                if (!row || row.length === 0) return;
                let categoryName = row[0] ? String(row[0]).trim() : "";
                let categoryLower = categoryName.toLowerCase();

                if (categoryName === "" || categoryName.startsWith("---") || categoryLower.includes("as of") || categoryLower === "category" || categoryLower === "total" || categoryLower.includes("bikeshop executive") || categoryLower.includes("mtd sales")) return; 

                let rawMTD = cleanDisplayValue(row[1]);
                let rawPY = cleanDisplayValue(row[2]);
                let rawPct = cleanDisplayValue(row[3]);
                let rawMargin = cleanDisplayValue(row[16]);
                let rawDis = cleanDisplayValue(row[20]);

                let floatMTD = safeFloat(row[1]); 
                let floatPY = safeFloat(row[2]); 
                let floatPct = safeFloat(row[3]); 
                let floatDis = safeFloat(row[20]);
                
                let calculatedVariance = floatMTD - floatPY;
                let isStockoutWarning = (floatDis > 0 && floatDis < 50 && floatPY > 500);

                let folderKey = "General Operations";
                let displayLabel = categoryName;

                if (categoryName.includes("-")) {
                    let parts = categoryName.split("-");
                    folderKey = parts[0].trim();
                    displayLabel = parts.slice(1).join("-").trim();
                } else if (categoryName.includes("/")) {
                    let parts = categoryName.split("/");
                    folderKey = parts[0].trim();
                    displayLabel = parts.slice(1).join("/").trim();
                }

                processedItems.push({
                    department: folderKey,
                    labelName: displayLabel,
                    fullName: categoryName,
                    txtMTD: rawMTD,
                    txtPY: rawPY,
                    txtPct: rawPct,
                    txtMargin: rawMargin,
                    txtDis: rawDis,
                    variance: calculatedVariance,
                    stockout: isStockoutWarning
                });
            });
            
            document.getElementById("uiAppSpinner").classList.add("hidden");
            renderAccordionSystem();
            renderWorkshopSystem(); 
            initialLoadDone = true; 
            switchMainView(currentActiveTab);
        }

        function switchMainView(targetView) {
            currentActiveTab = targetView;
            let btnAcc = document.getElementById("btnTabAccordion");
            let btnWk = document.getElementById("btnTabWorkshop");
            let panelAcc = document.getElementById("panelAccordionView");
            let panelWk = document.getElementById("panelWorkshopView");

            if (targetView === "accordion") {
                btnAcc.className = "py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 bg-slate-800 text-emerald-400 shadow-md";
                btnWk.className = "py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 text-slate-400 hover:text-slate-200";
                panelAcc.classList.remove("hidden");
                panelWk.classList.add("hidden");
            } else {
                btnWk.className = "py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 bg-slate-800 text-emerald-400 shadow-md";
                btnAcc.className = "py-4 text-base font-black tracking-wider uppercase rounded-lg transition-all duration-150 text-slate-400 hover:text-slate-200";
                panelWk.classList.remove("hidden");
                panelAcc.classList.add("hidden");
            }
        }

        function renderAccordionSystem() {
            const container = document.getElementById("panelAccordionView");
            container.innerHTML = "";
            let departments = {};
            processedItems.forEach(item => {
                if (!departments[item.department]) departments[item.department] = [];
                departments[item.department].push(item);
            });

            Object.keys(departments).sort().forEach(deptName => {
                let items = departments[deptName];
                let isExpanded = activeAccordionKeys.has(deptName);
                let deptCard = document.createElement("div");
                deptCard.className = "bg-slate-900 border-2 border-slate-800 rounded-xl overflow-hidden shadow-md";
                
                let headerBtn = document.createElement("button");
                headerBtn.className = "w-full px-4 py-5 flex items-center justify-between text-left focus:outline-none active:bg-slate-800/60";
                headerBtn.onclick = () => toggleAccordionDrawer(deptName);
                
                headerBtn.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-base font-black uppercase tracking-tight text-white">${deptName}</span>
                        <span class="text-xs font-mono font-bold text-slate-400 mt-0.5">${items.length} Category Rows</span>
                    </div>
                    <svg class="w-6 h-6 text-slate-400 transform transition-transform duration-200 ${isExpanded ? 'rotate-180' : ''}" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                    </svg>
                `;
                deptCard.appendChild(headerBtn);

                if (isExpanded) {
                    let drawerContent = document.createElement("div");
                    drawerContent.className = "border-t-2 border-slate-800 overflow-x-auto custom-scroll bg-slate-950/20";
                    let tableHTML = `
                        <table class="w-full text-left border-collapse min-w-[580px]">
                            <thead>
                                <tr class="bg-slate-950 border-b-2 border-slate-800 text-[12px] font-mono uppercase tracking-wider text-slate-400">
                                    <th class="py-3.5 px-4 font-black">Category Line</th>
                                    <th class="py-3.5 px-3 font-black text-right">MTD</th>
                                    <th class="py-3.5 px-3 font-black text-right">Variance</th>
                                    <th class="py-3.5 px-3 font-black text-right">Marg %</th>
                                    <th class="py-3.5 px-4 font-black text-right">DIS</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-slate-800 text-[16px] font-mono">
                    `;
                    items.forEach(item => {
                        let varColor = item.variance >= 0 ? "text-emerald-400" : "text-rose-400";
                        let varSign = item.variance > 0 ? "+" : "";
                        let cleanVarText = item.variance === 0 ? "0" : varSign + item.variance.toLocaleString('en-US', {maximumFractionDigits:0});
                        let bgRowClass = item.stockout ? "bg-rose-950/40" : "hover:bg-slate-800/40 active:bg-slate-800/60";
                        let labelAlertBadge = item.stockout ? ` <span class="ml-1 text-[11px] font-sans font-black bg-rose-500 text-slate-950 px-1.5 py-0.5 rounded uppercase tracking-wide animate-pulse">RISK</span>` : "";

                        tableHTML += `
                            <tr class="${bgRowClass} transition-colors">
                                <td class="py-4.5 px-4 font-sans text-slate-200 font-bold max-w-[210px] truncate">${item.labelName}${labelAlertBadge}</td>
                                <td class="py-4.5 px-3 text-right text-white font-black">${item.txtMTD}</td>
                                <td class="py-4.5 px-3 text-right ${varColor} font-black">${cleanVarText}</td>
                                <td class="py-4.5 px-3 text-right text-slate-300 font-bold">${item.txtMargin}</td>
                                <td class="py-4.5 px-4 text-right text-slate-100 font-black">${item.txtDis}</td>
                            </tr>
                        `;
                    });
                    tableHTML += `</tbody></table>`;
                    drawerContent.innerHTML = tableHTML;
                    deptCard.appendChild(drawerContent);
                }
                container.appendChild(deptCard);
            });
        }

        function toggleAccordionDrawer(key) {
            if (activeAccordionKeys.has(key)) { activeAccordionKeys.delete(key); } else { activeAccordionKeys.add(key); }
            renderAccordionSystem();
        }

        function renderWorkshopSystem() {
            const container = document.getElementById("panelWorkshopView");
            container.innerHTML = "";
            let workshopLines = processedItems.filter(item => {
                let name = item.fullName.toLowerCase();
                return name.includes("workshop") || name.includes("service") || name.includes("labour") || name.includes("tech");
            });

            if (workshopLines.length === 0) {
                container.innerHTML = `<div class="bg-slate-900 border border-slate-800 rounded-xl p-8 text-center"><p class="text-sm font-mono text-slate-400 uppercase tracking-widest">No matching workshop routes found</p></div>`;
                return;
            }

            let wrapper = document.createElement("div");
            wrapper.className = "bg-slate-900 border-2 border-slate-800 rounded-xl overflow-hidden shadow-md";
            let tableHTML = `
                <div class="px-4 py-4 border-b-2 border-slate-800 bg-slate-950"><h3 class="text-sm font-black uppercase tracking-wider text-emerald-400 font-mono">Workshop Channels</h3></div>
                <div class="overflow-x-auto custom-scroll">
                    <table class="w-full text-left border-collapse min-w-[580px]">
                        <thead>
                            <tr class="bg-slate-950 border-b-2 border-slate-800 text-[12px] font-mono uppercase tracking-wider text-slate-400">
                                <th class="py-3.5 px-4 font-black">Segment Name</th>
                                <th class="py-3.5 px-3 font-black text-right">MTD</th>
                                <th class="py-3.5 px-3 font-black text-right">Variance</th>
                                <th class="py-3.5 px-3 font-black text-right">Marg %</th>
                                <th class="py-3.5 px-4 font-black text-right">DIS</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-800 text-[16px] font-mono">
            `;

            workshopLines.forEach(item => {
                let varColor = item.variance >= 0 ? "text-emerald-400" : "text-rose-400";
                let varSign = item.variance > 0 ? "+" : "";
                let cleanVarText = item.variance === 0 ? "0" : varSign + item.variance.toLocaleString('en-US', {maximumFractionDigits:0});

                tableHTML += `
                    <tr class="hover:bg-slate-800/40 active:bg-slate-800/60 transition-colors">
                        <td class="py-4.5 px-4 font-sans text-slate-200 font-bold max-w-[210px] truncate">${item.fullName}</td>
                        <td class="py-4.5 px-3 text-right text-white font-black">${item.txtMTD}</td>
                        <td class="py-4.5 px-3 text-right ${varColor} font-black">${cleanVarText}</td>
                        <td class="py-4.5 px-3 text-right text-slate-300 font-bold">${item.txtMargin}</td>
                        <td class="py-4.5 px-4 text-right text-slate-100 font-black">${item.txtDis}</td>
                    </tr>
                `;
            });

            tableHTML += `</tbody></table></div>`;
            wrapper.innerHTML = tableHTML;
            container.appendChild(wrapper);
        }

        function cleanDisplayValue(val) {
            if (val === undefined || val === null) return "0";
            let s = String(val).trim();
            return (s === "" || s === "0.00" || s === "0.0") ? "0" : s;
        }

        function safeFloat(val) {
            if (!val) return 0;
            let s = String(val).replace(/[^0-9.-]/g, "");
            let f = parseFloat(s);
            return isNaN(f) ? 0 : f;
        }
    </script>
</body>
</html>
